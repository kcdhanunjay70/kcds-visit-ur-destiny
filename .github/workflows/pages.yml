name: Build static site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: static-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static files
        run: |
          test -f index.html
          test -f styles.css
          test -f app.js
          test -f render.yaml

      - name: Package site
        uses: actions/upload-artifact@v4
        with:
          name: kcds-visit-ur-destiny-site
          path: |
            index.html
            styles.css
            app.js
            render.yaml
            README.md
